repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: mixed-line-ending

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bash -c 'cd www && npm run test:prettier'
        language: system
        pass_filenames: false
        files: ^www/src/.*\.(tsx?|css)$
      - id: eslint
        name: eslint
        entry: bash -c 'cd www && npm run lint'
        language: system
        pass_filenames: false
        files: ^www/src/.*\.tsx?$
